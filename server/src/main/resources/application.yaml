server:
  port: 9090

spring:
  application:
    name: voting-system
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/voting-realm

#        jwt:
#          issuer-uri: http://localhost:8080/realms/voting-realm
#          jwk-set-uri: http://localhost:8080/realms/voting-realm/protocol/openid-connect/certs
logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.tool.hbm2ddl: DEBUG
    org.springframework.boot.context.properties: DEBUG

keycloak-admin:
  server-url: "http://localhost:8080"
  realm: "voting-realm"
  client-id: "voting-admin"
  client-secret: ${VOTING_ADMIN_CLIENT_SECRET}

app:
  cors:
    allowed-origins:
    - http://localhost:5173
    - http://localhost:3000
  security:
    roles-client-id: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_CLIENT_ID:voting-backend}

sync:
  secret: ${SYNC_SECRET}

web3j:
  chain-id: 31337 #5777 for ganache
  client-address: http://127.0.0.1:8545
  private-key: ${RELAYER_PRIVATE_KEY}
  election-factory-address: ${ELECTION_FACTORY_ADDRESS:}
  confirmations: 2
  start-block: 0
  listener:
    poll-interval-ms: 5000
