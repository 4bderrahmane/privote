server:
  port: 9090

spring:
  application:
    name: voting-system
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KC_ISSUER_URI:http://localhost:8080/realms/voting-realm}
          jwk-set-uri: ${KC_JWK_SET_URI:http://localhost:8080/realms/voting-realm/protocol/openid-connect/certs}

keycloak-admin:
  server-url: "http://localhost:8080"
  realm: "voting-realm"
  client-id: "voting-admin"
  client-secret: ${VOTING_ADMIN_CLIENT_SECRET}

app:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:3000
  security:
    roles-client-id: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_CLIENT_ID:voting-backend}

sync:
  secret: ${SYNC_SECRET}
  max-skew-seconds: ${SYNC_MAX_SKEW_SECONDS:300}
  replay-window-seconds: ${SYNC_REPLAY_WINDOW_SECONDS:600}

web3j:
  chain-id: 31337
  client-address: http://127.0.0.1:8545
  private-key: ${RELAYER_PRIVATE_KEY}
  election-factory-address: ${ELECTION_FACTORY_ADDRESS:}
  confirmations: 2
  start-block: 0
  listener:
    poll-interval-ms: 5000
